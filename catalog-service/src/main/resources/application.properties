# --- Catalog service ---
spring.application.name=catalog-service

# Its own port (order-service stays on 8080)
server.port=8081

# H2 file-mode (persists across restarts), separate DB file from order-service
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/catalogdb}
spring.datasource.username=sa
spring.datasource.password=
# R20: explicit connection-pool sizing + fail-fast on exhaustion
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.h2.console.enabled=${H2_CONSOLE:true}

# No entities yet — `update` is fine for the empty skeleton.
# We switch to Flyway + ddl-auto=validate when Product moves in (Step 2).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.tracing.sampling.probability=${TRACE_SAMPLING:1.0}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# --- Redis (Upstash) ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Tell Spring's cache abstraction to use Redis as the backing store
spring.cache.type=redis

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}

security.jwt.issuer=${JWT_ISSUER:http://localhost:8084}