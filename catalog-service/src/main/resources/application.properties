# --- Catalog service ---
spring.application.name=catalog-service

# Its own port (order-service stays on 8080)
server.port=8081

# H2 file-mode (persists across restarts), separate DB file from order-service
spring.datasource.url=jdbc:h2:file:./data/catalogdb
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# No entities yet — `update` is fine for the empty skeleton.
# We switch to Flyway + ddl-auto=validate when Product moves in (Step 2).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- Redis (Upstash) ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Tell Spring's cache abstraction to use Redis as the backing store
spring.cache.type=redis