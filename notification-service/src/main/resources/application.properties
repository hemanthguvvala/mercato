spring.application.name=notification-service

spring.kafka.bootstrap-servers=localhost:9092

# This service's identity as a consumer. All instances sharing this group-id
# split the topic's partitions between them (scaling). A DIFFERENT group would
# get its OWN full copy of the stream.
spring.kafka.consumer.group-id=notification-service

# No committed offset yet for this group? Start from the OLDEST message, so we
# pick up events already on the topic (not just ones produced after we start).
# Default is "latest" (only new messages) — change to earliest for learning.
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialize the JSON value back into a Java object.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# CROSS-SERVICE GOTCHA: the producer stamped a header naming order-service's class
# (com.interview.orderservice.event.OrderPlaced), which does NOT exist here. Tell the
# deserializer to IGNORE that header and always map to OUR record instead.
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.interview.notificationservice.event.OrderPlaced
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# --- Redis (Upstash) — idempotency dedup store (StringRedisTemplate, not the cache abstraction) ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

management.tracing.sampling.probability=1.0
