spring.application.name=api-gateway

server.port=8090

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=lb://order-service 
spring.cloud.gateway.routes[0].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=lb://catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates=Path=/auth/**

# Redis (same Upstash instance; gateway needs it for the rate-limiter buckets)
spring.data.redis.host=${REDIS_HOST:useful-lemur-94598.upstash.io}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
# Fail fast instead of hanging if Redis is unreachable (so errors are visible)
spring.data.redis.timeout=3000ms
spring.data.redis.connect-timeout=3000ms

# Expose health so we can read the Redis status directly
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Rate-limit the products route: 5/sec sustained, burst up to 10, keyed per user
spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=10
spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@userKeyResolver}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}
