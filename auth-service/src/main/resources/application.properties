# --- Auth service: owns login + JWT issuance (R42) ---
spring.application.name=auth-service

# order 8080, catalog 8081, inventory 8082, payment 8083, gateway 8090, auth 8084
server.port=8084

# Same secret + expiry as order-service/gateway so issued tokens validate everywhere.
#jwt.secret-key=${JWT_SECRET_KEY:local-dev-only-change-me-via-JWT_SECRET_KEY-env-0123456789}
jwt.expiry-ms=900000
jwt.issuer=http://localhost:8084

# Register with Eureka for discovery (gateway routes lb://auth-service)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
