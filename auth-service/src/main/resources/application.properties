# --- Auth service: owns login + JWT issuance (R42) ---
spring.application.name=auth-service

# order 8080, catalog 8081, inventory 8082, payment 8083, gateway 8090, auth 8084
server.port=8084

# Same secret + expiry as order-service/gateway so issued tokens validate everywhere.
#jwt.secret-key=${JWT_SECRET_KEY:local-dev-only-change-me-via-JWT_SECRET_KEY-env-0123456789}
jwt.expiry-ms=900000
jwt.issuer=${JWT_ISSUER:http://localhost:8084}

# Register with Eureka for discovery (gateway routes lb://auth-service)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# R15: user store DB (H2 file locally; Postgres in prod)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/authdb}
spring.datasource.username=sa
spring.datasource.password=
# R20: explicit connection-pool sizing + fail-fast on exhaustion
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Dev seed only — overridable via env; real prod users come from a signup/admin flow
app.seed.user-password=${SEED_USER_PASSWORD:password123}
app.seed.admin-password=${SEED_ADMIN_PASSWORD:admin123}

jwt.audience=${JWT_AUDIENCE:mercato}
