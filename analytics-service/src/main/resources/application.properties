spring.application.name=analytics-service

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
# R19: one consumer thread per partition (bounded by the topic's partition count)
spring.kafka.listener.concurrency=3

# DIFFERENT group-id from notification-service. This is what makes it FAN-OUT:
# analytics-service gets its OWN copy of every OrderPlaced, independent of notification.
# (Same group-id would instead SPLIT the messages between the two services.)
spring.kafka.consumer.group-id=analytics-service

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Ignore producer's type header; map onto THIS service's OrderPlaced (Phase 3 lesson).
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.interview.analyticsservice.event.OrderPlaced
spring.kafka.consumer.properties.spring.json.trusted.packages=com.interview.*

# --- Redis (Upstash) — idempotency dedup store (NOT the cache abstraction; we use StringRedisTemplate directly) ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
