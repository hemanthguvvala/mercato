spring.application.name=review-service
server.port=${SERVER_PORT:8087}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/reviewdb;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}

spring.flyway.enabled=true

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

security.jwt.issuer=${JWT_ISSUER:http://localhost:8084}
security.jwt.audience=${JWT_AUDIENCE:mercato}
