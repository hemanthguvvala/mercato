name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Build all 12 modules + run unit/slice tests. Integration tests (@Tag("integration"),
      # the full-context @SpringBootTest ones) are excluded — they need real infra and run
      # in the deploy/integration phase once Docker is available.
      - name: Build + test
        run: mvn -B verify -DexcludedGroups=integration
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      # Testcontainers spins real Kafka/Redis via the Docker daemon on the runner.
      - name: Integration tests (Testcontainers)
        run: mvn -B verify -Dgroups=integration -pl analytics-service -am

