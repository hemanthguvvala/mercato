# --- Payment service (stateless gateway simulation) ---
spring.application.name=payment-service

# order 8080, catalog 8081, inventory 8082, payment 8083
server.port=8083

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Register with Eureka for discovery
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# Simulation knob: decline any charge above this amount (lets us deterministically
# trigger the saga's failure/compensation path with a big order).
payment.decline-above-amount=5000

management.tracing.sampling.probability=${TRACE_SAMPLING:1.0}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}

security.jwt.issuer=${JWT_ISSUER:http://localhost:8084}
security.jwt.audience=${JWT_AUDIENCE:mercato}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/paymentdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE:false}
