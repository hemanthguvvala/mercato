# --- Inventory service ---
spring.application.name=inventory-service

# Its own port (order 8080, catalog 8081, inventory 8082)
server.port=8082

# H2 file-mode (persists across restarts), separate DB file per service
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/inventorydb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
# R20: explicit connection-pool sizing + fail-fast on exhaustion
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.h2.console.enabled=${H2_CONSOLE:false}

# Flyway owns the schema; Hibernate only validates entities against it.
# (No entities/migrations yet — boots clean as an empty skeleton.)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Register with Eureka for discovery
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# gRPC server (net.devh): REST stays on 8082, gRPC listens here
grpc.server.port=9090

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}

security.jwt.issuer=${JWT_ISSUER:http://localhost:8084}
security.jwt.audience=${JWT_AUDIENCE:mercato}

inventory.reservation.sweep-delay-ms=${RESV_SWEEP_DELAY:60000}
inventory.reservation.expire-after-seconds=${RESV_EXPIRE_SECS:900}
