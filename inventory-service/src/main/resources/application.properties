# --- Inventory service ---
spring.application.name=inventory-service

# Its own port (order 8080, catalog 8081, inventory 8082)
server.port=8082

# H2 file-mode (persists across restarts), separate DB file per service
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/inventorydb}
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=${H2_CONSOLE:true}

# Flyway owns the schema; Hibernate only validates entities against it.
# (No entities/migrations yet — boots clean as an empty skeleton.)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Register with Eureka for discovery
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# gRPC server (net.devh): REST stays on 8082, gRPC listens here
grpc.server.port=9090

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}

