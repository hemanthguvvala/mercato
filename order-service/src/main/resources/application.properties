# App name (shows in logs / actuator later)
spring.application.name=order-service

# --- Step 3: JDBC / H2 ---
# A named in-memory H2 DB (kept alive while the app runs)
# Browse the DB at http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:orderdb)
spring.h2.console.enabled=${H2_CONSOLE:false}

# --- Step 5: JPA / Hibernate ---
# Let Hibernate create the schema from our @Entity (fine for learning; prod uses Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate
# Print the SQL Hibernate generates (key for the N+1 lesson later)
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

spring.jpa.properties.hibernate.default_batch_fetch_size=10

spring.jpa.open-in-view=false

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/orderdb}
server.port=${SERVER_PORT:8080}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
# R20: explicit pool sizing + fail-fast on exhaustion; bound Feign connect/read timeouts
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.cloud.openfeign.client.config.default.connect-timeout=2000
spring.cloud.openfeign.client.config.default.read-timeout=5000

management.tracing.sampling.probability=${TRACE_SAMPLING:1.0}

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents,prometheus
management.endpoint.health.show-details=when-authorized
# In prod, override via the JWT_SECRET_KEY environment variable (never commit a real secret).
#jwt.secret-key=local-dev-only-change-me-via-JWT_SECRET_KEY-env-0123456789
#jwt.expiry-ms=900000
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8084/oauth2/jwks}


eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

resilience4j.circuitbreaker.instances.catalog.sliding-window-size=5
resilience4j.circuitbreaker.instances.catalog.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalog.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.catalog.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.catalog.ignore-exceptions[0]=feign.FeignException$NotFound
resilience4j.circuitbreaker.instances.catalog.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.catalog.ignore-exceptions[1]=io.github.resilience4j.bulkhead.BulkheadFullException
resilience4j.circuitbreaker.instances.catalog.ignore-exceptions[2]=io.github.resilience4j.ratelimiter.RequestNotPermitted


resilience4j.retry.instances.catalog.max-attempts=3
resilience4j.retry.instances.catalog.wait-duration=200ms
resilience4j.retry.instances.catalog.ignore-exceptions[0]=feign.FeignException$NotFound
resilience4j.retry.instances.catalog.ignore-exceptions[1]=io.github.resilience4j.circuitbreaker.CallNotPermittedException

resilience4j.retry.instances.catalog.ignore-exceptions[2]=io.github.resilience4j.bulkhead.BulkheadFullException
resilience4j.retry.instances.catalog.ignore-exceptions[3]=io.github.resilience4j.ratelimiter.RequestNotPermitted

resilience4j.bulkhead.instances.catalog.max-concurrent-calls=5
resilience4j.bulkhead.instances.catalog.max-wait-duration=0

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}

resilience4j.ratelimiter.instances.catalog.limit-for-period=10
resilience4j.ratelimiter.instances.catalog.limit-refresh-period=1s
resilience4j.ratelimiter.instances.catalog.timeout-duration=0

# Slice 6: circuit breaker on the money path (inventory participant).
# Out-of-stock (FeignException.NotFound) is a business outcome, not a failure -> ignored so it never trips the breaker.
resilience4j.circuitbreaker.instances.inventory.sliding-window-size=5
resilience4j.circuitbreaker.instances.inventory.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.inventory.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.inventory.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.inventory.ignore-exceptions[0]=feign.FeignException$NotFound

# Slice 6: circuit breaker on the money path (payment participant).
# A 402 decline is a business outcome (converted to PaymentDeclinedException) -> ignored so it never trips the breaker.
resilience4j.circuitbreaker.instances.payment.sliding-window-size=5
resilience4j.circuitbreaker.instances.payment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.payment.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.payment.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.payment.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.payment.ignore-exceptions[0]=com.interview.orderservice.web.PaymentDeclinedException

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# R21: durable producer for the outbox — wait for all in-sync replicas + idempotent sends
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true

app.kafka.order-events-topic=${ORDER_TOPIC:order-events}


order.executor.saga.core-size=${SAGA_CORE:4}
order.executor.saga.max-size=${SAGA_MAX:8}
order.executor.saga.queue-capacity=${SAGA_QUEUE:50}
order.executor.audit.core-size=${AUDIT_CORE:2}
order.executor.audit.max-size=${AUDIT_MAX:4}
order.executor.audit.queue-capacity=${AUDIT_QUEUE:100}

security.jwt.issuer=${JWT_ISSUER:http://localhost:8084}
security.jwt.audience=${JWT_AUDIENCE:mercato}

order.reconciler.fixed-delay-ms=${RECONCILER_DELAY:15000}
order.reconciler.stale-after-seconds=${RECONCILER_STALE_SECS:30}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

spring.kafka.consumer.group-id=order-view
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.interview.events
spring.kafka.consumer.properties.spring.json.value.default.type=com.interview.events.OrderPlaced

# Slice 7: propagate the trace across the Kafka hop (publish -> consume) so an order traces end-to-end.
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true
