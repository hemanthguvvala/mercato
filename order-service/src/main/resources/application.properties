# App name (shows in logs / actuator later)
spring.application.name=order-service

# Server port (default 8080). Change here if 8080 is taken.
server.port=8080

# --- Step 3: JDBC / H2 ---
# A named in-memory H2 DB (kept alive while the app runs)
# Browse the DB at http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:orderdb)
spring.h2.console.enabled=true

# --- Step 5: JPA / Hibernate ---
# Let Hibernate create the schema from our @Entity (fine for learning; prod uses Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate
# Print the SQL Hibernate generates (key for the N+1 lesson later)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.default_batch_fetch_size=10

spring.jpa.open-in-view=false

spring.datasource.url=jdbc:h2:file:./data/orderdb
spring.datasource.username=sa
spring.datasource.password=

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
# In prod, override via the JWT_SECRET_KEY environment variable (never commit a real secret).
jwt.secret-key=local-dev-only-change-me-via-JWT_SECRET_KEY-env-0123456789
jwt.expiry-ms=900000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

resilience4j.circuitbreaker.instances.catalog.sliding-window-size=5
resilience4j.circuitbreaker.instances.catalog.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalog.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.catalog.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.catalog.ignore-exceptions[0]=feign.FeignException$NotFound
resilience4j.circuitbreaker.instances.catalog.minimum-number-of-calls=3

resilience4j.retry.instances.catalog.max-attempts=3
resilience4j.retry.instances.catalog.wait-duration=200ms
resilience4j.retry.instances.catalog.ignore-exceptions[0]=feign.FeignException$NotFound
resilience4j.retry.instances.catalog.ignore-exceptions[1]=io.github.resilience4j.circuitbreaker.CallNotPermittedException

resilience4j.bulkhead.instances.catalog.max-concurrent-calls=5
resilience4j.bulkhead.instances.catalog.max-wait-duration=0

resilience4j.ratelimiter.instances.catalog.limit-for-period=10
resilience4j.ratelimiter.instances.catalog.limit-refresh-period=1s
resilience4j.ratelimiter.instances.catalog.timeout-duration=0

